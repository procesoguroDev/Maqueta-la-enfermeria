<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>MultiSelect Bootstrap</title>
    <link rel="stylesheet" href="./styles/selector.css">
    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-body">

            <h3 class="mb-4">
                MultiSelect estilo PrimeVue
            </h3>

            <div class="multiselect-container">

                <!-- Caja -->
                <div
                    class="multiselect-box"
                    id="multiselectBox"
                >
                    <span class="placeholder">
                        Selecciona tecnologías
                    </span>
                </div>

                <!-- Dropdown -->
                <div
                    class="multiselect-dropdown"
                    id="dropdown"
                >

                    <div class="form-check">
                        <input
                            class="form-check-input option"
                            type="checkbox"
                            value="HTML"
                            id="html"
                        >
                        <label class="form-check-label" for="html">
                            HTML
                        </label>
                    </div>

                    <div class="form-check">
                        <input
                            class="form-check-input option"
                            type="checkbox"
                            value="CSS"
                            id="css"
                        >
                        <label class="form-check-label" for="css">
                            CSS
                        </label>
                    </div>

                    <div class="form-check">
                        <input
                            class="form-check-input option"
                            type="checkbox"
                            value="JavaScript"
                            id="js"
                        >
                        <label class="form-check-label" for="js">
                            JavaScript
                        </label>
                    </div>

                    <div class="form-check">
                        <input
                            class="form-check-input option"
                            type="checkbox"
                            value="PHP"
                            id="php"
                        >
                        <label class="form-check-label" for="php">
                            PHP
                        </label>
                    </div>

                    <div class="form-check">
                        <input
                            class="form-check-input option"
                            type="checkbox"
                            value="Python"
                            id="python"
                        >
                        <label class="form-check-label" for="python">
                            Python
                        </label>
                    </div>

                </div>

            </div>

            <button
                class="btn btn-primary mt-4"
                onclick="obtenerValores()"
            >
                Obtener valores
            </button>

        </div>
    </div>

</div>
    <script src="./js/selector.js"></script>

</body>
</html>
