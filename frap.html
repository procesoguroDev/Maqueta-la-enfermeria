<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FRAP Bootstrap</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="frap.css">
</head>

<body>

    <div class="container wizard-container">

        <!-- HEADER -->
        <div class="wizard-header d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Formato FRAP</h3>

            <span class="badge bg-primary badge-step">
                Paso <span id="currentStep">1</span> de 2
            </span>
        </div>

        <!-- ========================= -->
        <!-- PASO 1 -->
        <!-- ========================= -->

        <div class="wizard-step active">

            <div class="accordion" id="accordionPaso1">

                <!-- CARACTERISTICAS -->
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse"
                            data-bs-target="#collapseCaracteristicas">
                            Características personales
                        </button>
                    </h2>

                    <div id="collapseCaracteristicas" class="accordion-collapse collapse show">
                        <div class="accordion-body">

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label>Día de la semana</label>
                                    <input class="form-control" disabled value="Miércoles">
                                </div>

                                <div class="col-md-3 mb-3">
                                    <label>Fecha</label>
                                    <input type="date" class="form-control" disabled value="2026-05-01">
                                </div>
                            </div>

                            <div class="row">

                                <div class="col-md-2 mb-3">
                                    <label>Llamada</label>
                                    <input type="time" class="form-control" disabled value="08:00">
                                </div>

                                <div class="col-md-2 mb-3">
                                    <label>Salida</label>
                                    <input type="time" class="form-control" disabled value="08:10">
                                </div>

                                <div class="col-md-2 mb-3">
                                    <label>Traslado</label>
                                    <input type="time" class="form-control" disabled value="08:25">
                                </div>

                                <div class="col-md-2 mb-3">
                                    <label>Hospital</label>
                                    <input type="time" class="form-control" disabled value="08:40">
                                </div>

                                <div class="col-md-2 mb-3">
                                    <label>Base</label>
                                    <input type="time" class="form-control" disabled value="09:10">
                                </div>

                            </div>

                            <div class="row">

                                <div class="col-md-6 mb-3">
                                    <label>Motivo de atención</label>
                                    <input class="form-control" disabled value="Traslado">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label>Dirección del servicio</label>
                                    <input class="form-control" disabled
                                        value="Boeing 35-43, La Purísima, 76146 La Purísima, Qro.">
                                </div>

                            </div>

                            <div class="row">

                                <div class="col-md-6 mb-3">
                                    <label class="section-title">Lugar de la incidencia</label>

                                    <div class="check-group">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox">
                                            <label class="form-check-label">Hogar</label>
                                        </div>

                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox">
                                            <label class="form-check-label">Vía pública</label>
                                        </div>

                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox">
                                            <label class="form-check-label">Trabajo</label>
                                        </div>
                                    </div>
                                </div>

                            </div>

                            <div class="row">

                                <div class="col-md-6 mb-3">
                                    <label>Unidad</label>
                                    <input class="form-control" disabled value="AMB-01">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label>Número económico</label>
                                    <input class="form-control" disabled value="AMB-01">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label>Operador</label>
                                    <input class="form-control" disabled value="Thomas">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label>Médico regulador</label>
                                    <input class="form-control" disabled value="Genaro">
                                </div>

                            </div>

                        </div>
                    </div>
                </div>

                <!-- PACIENTE -->
                <div class="accordion-item">

                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                            data-bs-target="#collapsePaciente">
                            Datos del paciente
                        </button>
                    </h2>

                    <div id="collapsePaciente" class="accordion-collapse collapse">

                        <div class="accordion-body">

                            <div class="row">

                                <div class="col-md-4 mb-3">
                                    <div class="form-check mt-4">
                                        <input class="form-check-input" type="checkbox">
                                        <label class="form-check-label">
                                            Está afiliado
                                        </label>
                                    </div>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label>Sexo</label>

                                    <div class="check-group mt-2">

                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox">
                                            <label class="form-check-label">Mujer</label>
                                        </div>

                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" checked>
                                            <label class="form-check-label">Hombre</label>
                                        </div>

                                    </div>
                                </div>

                            </div>

                            <div class="row">

                                <div class="col-md-3 mb-3">
                                    <label>Años</label>
                                    <input class="form-control" disabled value="0">
                                </div>

                                <div class="col-md-3 mb-3">
                                    <label>Meses</label>
                                    <input class="form-control" disabled value="0">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label>Calle y número</label>
                                    <input class="form-control" disabled value="Boeing 35-43">
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label>Colonia</label>
                                    <input class="form-control" disabled value="La Purísima">
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label>Municipio</label>
                                    <input class="form-control" disabled value="Querétaro">
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label>Teléfono</label>
                                    <input class="form-control" disabled value="4432552078">
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label>Ocupación</label>
                                    <input class="form-control" disabled value="Estudiante">
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label>Derechohabiente</label>
                                    <input class="form-control" disabled>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label>Compañía de seguros</label>
                                    <input class="form-control" disabled value="NA">
                                </div>

                            </div>

                        </div>
                    </div>

                </div>

            </div>

        </div>

        <!-- ========================= -->
        <!-- PASO 2 -->
        <!-- ========================= -->

        <div class="wizard-step">

            <div class="accordion" id="accordionPaso2">

                <!-- SIGNOS -->
                <div class="accordion-item">

                    <h2 class="accordion-header">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse"
                            data-bs-target="#collapseSignos">
                            Signos vitales
                        </button>
                    </h2>

                    <div id="collapseSignos" class="accordion-collapse collapse show">

                        <div class="accordion-body">

                            <div class="table-responsive">

                                <table class="table table-bordered table-hover align-middle">

                                    <thead class="table-light">
                                        <tr>
                                            <th>Hora</th>
                                            <th>FR</th>
                                            <th>FC</th>
                                            <th>TAD</th>
                                            <th>TAS</th>
                                            <th>SaO2%</th>
                                            <th>Temp</th>
                                            <th>Glucosa</th>
                                            <th>Llenado capilar</th>
                                        </tr>
                                    </thead>

                                    <tbody>
                                        <tr>
                                            <td>08:00</td>
                                            <td>20</td>
                                            <td>80</td>
                                            <td>80</td>
                                            <td>120</td>
                                            <td>98%</td>
                                            <td>36.5</td>
                                            <td>90</td>
                                            <td>2 seg</td>
                                        </tr>
                                    </tbody>

                                </table>

                            </div>

                        </div>
                    </div>

                </div>

                <!-- EXPLORACION -->
                <div class="accordion-item">

                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                            data-bs-target="#collapseExploracion">
                            Exploración, antecedentes y condición
                        </button>
                    </h2>

                    <div id="collapseExploracion" class="accordion-collapse collapse">

                        <div class="accordion-body">

                            <div class="row">

                                <div class="col-md-4 mb-3">
                                    <label>Exploración física</label>

                                    <select class="form-select">
                                        <option>Ninguna</option>
                                        <option>Deformidades</option>
                                        <option>Contusiones</option>
                                        <option>Abrasiones</option>
                                        <option>Heridas</option>
                                        <option>Fracturas</option>
                                    </select>
                                </div>

                                <div class="col-md-8 mb-3">

                                    <label class="section-title">
                                        Condición del paciente
                                    </label>

                                    <div class="d-flex gap-2 flex-wrap">

                                        <button class="btn btn-success">
                                            Verde
                                        </button>

                                        <button class="btn btn-warning">
                                            Amarillo
                                        </button>

                                        <button class="btn btn-danger">
                                            Rojo
                                        </button>

                                        <button class="btn btn-dark">
                                            Negro
                                        </button>

                                    </div>

                                    <div class="mt-3">

                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" checked type="checkbox">
                                            <label class="form-check-label">Estable</label>
                                        </div>

                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="checkbox">
                                            <label class="form-check-label">Inestable</label>
                                        </div>

                                    </div>

                                </div>

                            </div>

                        </div>
                    </div>

                </div>

                <!-- ORIGEN PROBABLE -->
                <div class="accordion-item">

                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                            data-bs-target="#collapseOrigen">
                            Origen probable
                        </button>
                    </h2>

                    <div id="collapseOrigen" class="accordion-collapse collapse">

                        <div class="accordion-body">

                            <div class="row">

                                <div class="col-md-12">

                                    <div class="row g-3">

                                        <div class="col-md-4">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="neurologico">
                                                <label class="form-check-label" for="neurologico">
                                                    Neurológico
                                                </label>
                                            </div>
                                        </div>

                                        <div class="col-md-4">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="cardiovascular">
                                                <label class="form-check-label" for="cardiovascular">
                                                    Cardiovascular
                                                </label>
                                            </div>
                                        </div>

                                        <div class="col-md-4">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="respiratorio">
                                                <label class="form-check-label" for="respiratorio">
                                                    Respiratorio
                                                </label>
                                            </div>
                                        </div>

                                        <div class="col-md-4">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="metabolico">
                                                <label class="form-check-label" for="metabolico">
                                                    Metabólico
                                                </label>
                                            </div>
                                        </div>

                                        <div class="col-md-4">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="digestivo">
                                                <label class="form-check-label" for="digestivo">
                                                    Digestivo
                                                </label>
                                            </div>
                                        </div>

                                        <div class="col-md-4">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="urogenital">
                                                <label class="form-check-label" for="urogenital">
                                                    Urogenital
                                                </label>
                                            </div>
                                        </div>

                                        <div class="col-md-4">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="gineco">
                                                <label class="form-check-label" for="gineco">
                                                    Ginecoobstétrico
                                                </label>
                                            </div>
                                        </div>

                                        <div class="col-md-4">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="emocional">
                                                <label class="form-check-label" for="emocional">
                                                    Cognitivo emocional
                                                </label>
                                            </div>
                                        </div>

                                        <div class="col-md-4">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="musculo">
                                                <label class="form-check-label" for="musculo">
                                                    Musculoesquelético
                                                </label>
                                            </div>
                                        </div>

                                        <div class="col-md-4">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="infeccioso">
                                                <label class="form-check-label" for="infeccioso">
                                                    Infeccioso
                                                </label>
                                            </div>
                                        </div>

                                        <div class="col-md-4">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="oncologico">
                                                <label class="form-check-label" for="oncologico">
                                                    Oncológico
                                                </label>
                                            </div>
                                        </div>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>
            </div>

        </div>

        <!-- BOTONES -->
        <div class="wizard-buttons">

            <button class="btn btn-outline-secondary" id="prevBtn">
                Anterior
            </button>

            <button class="btn btn-primary" id="nextBtn">
                Siguiente
            </button>

        </div>

    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./frap.js">

    </script>

</body>

</html>
